# ==========================================
# Server Configuration
# ==========================================
server:
  port: ${SERVER_PORT:${PORT:8082}}

# ==========================================
# Spring Framework Configuration
# ==========================================
spring:
  config:
    import:
      - optional:file:.env[.properties]
      - optional:file:../.env[.properties]
  application:
    name: follow-service
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:connectsphere}
    password: ${RABBITMQ_PASSWORD:connectsphere}
  datasource:
    url: ${FOLLOW_DB_URL:jdbc:mysql://localhost:3309/connectsphere_follow?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
    username: ${FOLLOW_DB_USERNAME:root}
    password: ${FOLLOW_DB_PASSWORD:root}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration

# ==========================================
# Application Settings
# ==========================================
app:
  cors:
    allowed-origin: ${FOLLOW_CORS_ALLOWED_ORIGIN:http://localhost:4200}

# ==========================================
# Downstream Service Clients
# ==========================================
clients:
  auth-service:
    url: ${AUTH_SERVICE_URL:http://localhost:8080}

# ==========================================
# Service Discovery Configuration
# ==========================================
eureka:
  client:
    enabled: ${EUREKA_ENABLED:true}
    service-url:
      defaultZone: ${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka/}

# ==========================================
# Actuator Management Endpoints
# ==========================================
management:
  endpoints:
    web:
      exposure:
        include: health,info

# ==========================================
# OpenAPI and Swagger Configuration
# ==========================================
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
