# ==========================================
# Server Configuration
# ==========================================
server:
  port: ${SERVER_PORT:${PORT:8084}}

# ==========================================
# Spring Framework Configuration
# ==========================================
spring:
  config:
    import:
      - optional:file:.env[.properties]
      - optional:file:../.env[.properties]
  application:
    name: like-service
  cloud:
    openfeign:
      okhttp:
        enabled: true
  datasource:
    url: ${LIKE_DB_URL:jdbc:mysql://localhost:3311/connectsphere_like?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
    username: ${LIKE_DB_USERNAME:root}
    password: ${LIKE_DB_PASSWORD:root}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration

# ==========================================
# Downstream Service Clients
# ==========================================
clients:
  auth-service:
    url: ${AUTH_SERVICE_URL:http://localhost:8080}
  post-service:
    url: ${POST_SERVICE_URL:http://localhost:8081}
  comment-service:
    url: ${COMMENT_SERVICE_URL:http://localhost:8083}

# ==========================================
# Service Discovery Configuration
# ==========================================
eureka:
  client:
    enabled: ${EUREKA_ENABLED:true}
    service-url:
      defaultZone: ${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka/}

# ==========================================
# Actuator Management Endpoints
# ==========================================
management:
  endpoints:
    web:
      exposure:
        include: health,info

# ==========================================
# OpenAPI and Swagger Configuration
# ==========================================
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
