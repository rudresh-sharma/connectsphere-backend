# ==========================================
# Server Configuration
# ==========================================
server:
  port: 8086

# ==========================================
# Spring Framework Configuration
# ==========================================
spring:
  config:
    import:
      - optional:file:.env[.properties]
      - optional:file:../.env[.properties]
  application:
    name: media-service
  cloud:
    openfeign:
      okhttp:
        enabled: true
  datasource:
    url: ${MEDIA_DB_URL:jdbc:mysql://localhost:3313/connectsphere_media?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
    username: ${MEDIA_DB_USERNAME:root}
    password: ${MEDIA_DB_PASSWORD:root}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

# ==========================================
# Cloudinary Integration
# ==========================================
cloudinary:
  cloud-name: ${CLOUDINARY_CLOUD_NAME:}
  api-key: ${CLOUDINARY_API_KEY:}
  api-secret: ${CLOUDINARY_API_SECRET:}
  folder: ${CLOUDINARY_FOLDER:connectsphere/media}

# ==========================================
# Downstream Service Clients
# ==========================================
clients:
  auth-service:
    url: ${AUTH_SERVICE_URL:http://localhost:8080}
  follow-service:
    url: ${FOLLOW_SERVICE_URL:http://localhost:8082}

# ==========================================
# Service Discovery Configuration
# ==========================================
eureka:
  client:
    enabled: ${EUREKA_ENABLED:true}
    service-url:
      defaultZone: ${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka/}

# ==========================================
# Actuator Management Endpoints
# ==========================================
management:
  endpoints:
    web:
      exposure:
        include: health,info

# ==========================================
# OpenAPI and Swagger Configuration
# ==========================================
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
