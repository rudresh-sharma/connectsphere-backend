name: Backend CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  backend:
    name: Backend build and tests
    runs-on: ubuntu-latest
    env:
      EUREKA_ENABLED: "false"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Disable local .env overrides in CI
        run: |
          if [ -f .env ]; then
            mv .env .env.ci.bak
          fi

      - name: Test backend
        run: mvn test

  deploy-aws:
    name: Deploy backend to AWS
    runs-on: ubuntu-latest
    needs: backend
    if: >-
      github.event_name != 'pull_request' &&
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    env:
      AWS_EC2_HOST: ${{ secrets.AWS_EC2_HOST }}
      AWS_EC2_USER: ${{ secrets.AWS_EC2_USER }}
      AWS_EC2_SSH_KEY: ${{ secrets.AWS_EC2_SSH_KEY }}
    steps:
      - name: Check AWS deploy secrets
        id: aws-secrets
        run: |
          if [ -n "$AWS_EC2_HOST" ] && [ -n "$AWS_EC2_USER" ] && [ -n "$AWS_EC2_SSH_KEY" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "AWS deploy skipped because one or more required GitHub secrets are missing."
          fi

      - name: Deploy over SSH
        if: steps.aws-secrets.outputs.configured == 'true'
        uses: appleboy/ssh-action@v1.2.0
        env:
          BRANCH_NAME: ${{ github.ref_name }}
          BACKEND_APP_DIR: ${{ vars.BACKEND_APP_DIR }}
          BACKEND_COMPOSE_FILE: ${{ vars.BACKEND_COMPOSE_FILE }}
        with:
          host: ${{ secrets.AWS_EC2_HOST }}
          username: ${{ secrets.AWS_EC2_USER }}
          key: ${{ secrets.AWS_EC2_SSH_KEY }}
          envs: BRANCH_NAME,BACKEND_APP_DIR,BACKEND_COMPOSE_FILE
          script: |
            set -eu

            APP_DIR="${BACKEND_APP_DIR:-$HOME/connectsphere-backend}"
            COMPOSE_FILE="${BACKEND_COMPOSE_FILE:-docker-compose.app.yml}"

            cd "$APP_DIR"
            if [ ! -f "$COMPOSE_FILE" ] && [ -f "docker-compose.yml" ]; then
              COMPOSE_FILE="docker-compose.yml"
            fi

            echo "Deploying branch: $BRANCH_NAME"
            echo "App directory: $APP_DIR"
            echo "Compose file: $COMPOSE_FILE"

            git fetch --prune origin
            git checkout -B "$BRANCH_NAME" "origin/$BRANCH_NAME"
            git reset --hard "origin/$BRANCH_NAME"
            git status --short
            docker compose -f "$COMPOSE_FILE" up -d --build
