# ==========================================
# Server Configuration
# ==========================================
server:
  port: ${SERVER_PORT:${PORT:8080}}
  forward-headers-strategy: framework

# ==========================================
# Spring Framework Configuration
# ==========================================
spring:
  config:
    import:
      - optional:file:.env[.properties]
      - optional:file:../.env[.properties]
  application:
    name: auth-service
  datasource:
    url: ${AUTH_DB_URL:jdbc:mysql://localhost:3307/connectsphere_auth?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
    username: ${AUTH_DB_USERNAME:root}
    password: ${AUTH_DB_PASSWORD:root}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:connectsphere}
    password: ${RABBITMQ_PASSWORD:connectsphere}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 12MB
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:google-client-id}
            client-secret: ${GOOGLE_CLIENT_SECRET:google-client-secret}
            scope:
              - openid
              - profile
              - email
          github:
            client-id: ${GITHUB_CLIENT_ID:github-client-id}
            client-secret: ${GITHUB_CLIENT_SECRET:github-client-secret}
            scope:
              - read:user
              - user:email

# ==========================================
# Application Settings
# ==========================================
app:
  frontend:
    oauth-success-url: ${OAUTH_SUCCESS_URL:http://localhost:4200/auth/callback}
    oauth-failure-url: ${OAUTH_FAILURE_URL:http://localhost:4200/login}
    oauth-setup-url: ${OAUTH_SETUP_URL:http://localhost:4200/auth/choose-username}
  admin:
    username: ${APP_ADMIN_USERNAME:admin}
    email: ${APP_ADMIN_EMAIL:admin@connectsphere.local}
    password: ${APP_ADMIN_PASSWORD:}
    full-name: ${APP_ADMIN_FULL_NAME:System Admin}
  jwt:
    secret: ${JWT_SECRET:}
    expiration-seconds: ${JWT_EXPIRATION_SECONDS:86400}

# ==========================================
# Cloudinary Integration
# ==========================================
cloudinary:
  cloud-name: ${CLOUDINARY_CLOUD_NAME:}
  api-key: ${CLOUDINARY_API_KEY:}
  api-secret: ${CLOUDINARY_API_SECRET:}
  folder: ${CLOUDINARY_PROFILE_FOLDER:connectsphere/profiles}

# ==========================================
# Downstream Service Clients
# ==========================================
clients:
  post-service:
    url: ${POST_SERVICE_URL:http://localhost:8081}
  search-service:
    url: ${SEARCH_SERVICE_URL:http://localhost:8087}
  follow-service:
    url: ${FOLLOW_SERVICE_URL:http://localhost:8082}
  notification-service:
    url: ${NOTIFICATION_SERVICE_URL:http://localhost:8085}

# ==========================================
# Service Discovery Configuration
# ==========================================
eureka:
  client:
    enabled: ${EUREKA_ENABLED:true}
    service-url:
      defaultZone: ${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka/}

# ==========================================
# Actuator Management Endpoints
# ==========================================
management:
  endpoints:
    web:
      exposure:
        include: health,info

# ==========================================
# OpenAPI and Swagger Configuration
# ==========================================
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
