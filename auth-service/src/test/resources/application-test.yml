spring:
  datasource:
    url: jdbc:h2:mem:connectsphere_auth;MODE=MySQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  flyway:
    enabled: false
  jpa:
    hibernate:
      ddl-auto: create-drop
  data:
    redis:
      repositories:
        enabled: false

eureka:
  client:
    enabled: false
